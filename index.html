  <style>
    * {
      font-family: 'Kanit', 'Sarabun', sans-serif;
    }

    /* วิดีโอพื้นหลัง */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.6) blur(2px) saturate(1.2);
      transition: filter 0.5s ease;
    }

    /* Animated background overlay */
    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, rgba(59, 130, 246, 0.2), rgba(147, 51, 234, 0.2), rgba(236, 72, 153, 0.1), rgba(16, 185, 129, 0.1));
      background-size: 400% 400%;
      animation: gradient-x 8s ease infinite;
      z-index: -1;
    }

    /* Floating orbs */
    .floating-orb {
      position: fixed;
      border-radius: 50%;
      background: linear-gradient(45deg, rgba(59, 130, 246, 0.3), rgba(147, 51, 234, 0.3));
      filter: blur(2px);
      pointer-events: none;
      z-index: 1;
      animation: float 6s ease-in-out infinite;
    }

    .orb-1 { width: 60px; height: 60px; top: 20%; left: 10%; animation-delay: 0s; }
    .orb-2 { width: 80px; height: 80px; top: 60%; right: 15%; animation-delay: 2s; }
    .orb-3 { width: 40px; height: 40px; bottom: 20%; left: 20%; animation-delay: 4s; }
    .orb-4 { width: 70px; height: 70px; top: 30%; right: 30%; animation-delay: 1s; }

    /* การ์ดโปรไฟล์ */
    .profile-card {
      backdrop-filter: blur(25px) saturate(180%);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
      border: 2px solid rgba(255, 255, 255, 0.3);
      box-shadow:
        0 32px 64px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 0 100px rgba(59, 130, 246, 0.1);
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      animation: shimmer 3s infinite;
    }

    /* รูปโปรไฟล์ */
    .profile-image-container {
      position: relative;
      display: inline-block;
    }

    .profile-image {
      border: 5px solid rgba(255, 255, 255, 0.9);
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.4),
        0 0 30px rgba(59, 130, 246, 0.3);
      filter: brightness(1.1) saturate(1.3) contrast(1.1);
      position: relative;
      z-index: 2;
    }

    .profile-ring {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border: 3px solid transparent;
      border-radius: 50%;
      background: linear-gradient(45deg, #3b82f6, #8b5cf6, #ec4899, #10b981);
      background-size: 300% 300%;
      animation: gradient-x 4s ease infinite, rotate-slow 8s linear infinite;
      z-index: 1;
    }

    /* ปุ่มโซเชียล */
    .social-btn {
      backdrop-filter: blur(15px) saturate(180%);
      border: 2px solid rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      background-size: 200% 200%;
    }

    .social-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.6s ease;
      z-index: 1;
    }

    .social-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.2), transparent);
      transition: all 0.5s ease;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    .social-btn:hover::before {
      left: 100%;
    }

    .social-btn:hover::after {
      width: 300px;
      height: 300px;
    }

    .social-btn:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow:
        0 25px 50px rgba(0, 0, 0, 0.3),
        0 0 30px rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .social-btn:active {
      transform: translateY(-2px) scale(1.01);
    }

    /* Instagram gradient */
    .social-btn.instagram {
      background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);

      animation: gradient-x 6s ease infinite;

    /* TikTok gradient */
    .social-btn.tiktok {

      background-size: 400% 400%;
      animation: gradient-x 6s ease infinite;

    /* X (Twitter) gradient */
    .social-btn.twitter {
      background: linear-gradient(45deg, #1da1f2, #0d8bd9, #0a7ec8, #000000);
      background-size: 400% 400%;
      animation: gradient-x 6s ease infinite;
    }

    /* เอฟเฟกต์ไอคอน */
    .social-btn i {
      transition: all 0.4s ease;
      filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.4));
      position: relative;
      z-index: 2;
    }

    .social-btn:hover i {
      transform: scale(1.3) rotate(10deg);
      filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.5));
    }

    .social-btn span {
      position: relative;
      z-index: 2;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ตัวควบคุมเสียง */
    .volume-control {
      backdrop-filter: blur(20px) saturate(180%);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.15));
      border: 2px solid rgba(255, 255, 255, 0.4);
      box-shadow:
        0 15px 30px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transition: all 0.4s ease;
    }

    .volume-control:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.25));
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    /* Enhanced Slider */
    input[type=range] {
      -webkit-appearance: none;
      width: 120px;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right, #3b82f6, #8b5cf6, #ec4899, #10b981);
      outline: none;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    input[type=range]:hover {
      transform: scaleY(1.5);
      box-shadow:
        inset 0 2px 4px rgba(0, 0, 0, 0.2),
        0 0 20px rgba(59, 130, 246, 0.5);
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(45deg, #ffffff, #f1f5f9, #e2e8f0);
      border: 3px solid #3b82f6;
      cursor: pointer;
      box-shadow:
        0 6px 12px rgba(0, 0, 0, 0.3),
        0 0 0 2px rgba(59, 130, 246, 0.2);
      transition: all 0.3s ease;
    }

    input[type=range]:hover::-webkit-slider-thumb {
      transform: scale(1.4);
      box-shadow:
        0 8px 16px rgba(59, 130, 246, 0.4),
        0 0 0 4px rgba(59, 130, 246, 0.3);
      background: linear-gradient(45deg, #ffffff, #ddd6fe);
    }

    /* หิมะตก */
    #snow-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 15;
    }

    /* Enhanced text effects */
    .text-gradient {
      background: linear-gradient(45deg, #3b82f6, #8b5cf6, #ec4899, #10b981);
      background-size: 300% 300%;
      animation: gradient-x 4s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .text-glow {
      text-shadow:
        0 0 10px rgba(59, 130, 246, 0.5),
        0 0 20px rgba(147, 51, 234, 0.3),
        0 4px 8px rgba(0, 0, 0, 0.5);
    }

    .description-text {
      text-shadow:
        0 2px 4px rgba(0, 0, 0, 0.6),
        0 0 15px rgba(59, 130, 246, 0.3);
      background: linear-gradient(45deg, rgba(255, 255, 255, 0.95), rgba(240, 245, 255, 0.9));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Loading animation */
    .loading-spinner {
      background: linear-gradient(45deg, #3b82f6, #8b5cf6);
      animation: spin 1s linear infinite;
    }

    /* Star field effect */
    .star {
      position: fixed;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        padding: 8px;
      }

      .profile-card {
        max-width: 95%;
        padding: 24px 18px;
        margin: 0 auto;
      }

      .profile-image {
        width: 120px;
        height: 120px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .social-btn {
        padding: 14px 18px;
        font-size: 16px;
        touch-action: manipulation;
      }

      .volume-control {
        top: 10px;
        left: 10px;
        padding: 10px 14px;
        font-size: 14px;
      }

      input[type=range] {
        width: 100px;
      }

      .floating-orb {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .profile-card {
        padding: 20px 16px;
      }

      .profile-image {
        width: 110px;
        height: 110px;
      }

      h1 {
        font-size: 1.3rem;
      }

      p {
        font-size: 15px;
      }

      .social-btn {
        padding: 12px 16px;
        font-size: 15px;
      }
    }

    /* Animation delays */
    .animate-delay-1 { animation-delay: 0.2s; }
    .animate-delay-2 { animation-delay: 0.4s; }
    .animate-delay-3 { animation-delay: 0.6s; }
    .animate-delay-4 { animation-delay: 0.8s; }

    /* Preloader */
    .preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1e293b, #0f172a, #1e1b4b);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    .preloader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .preloader-content {
      text-align: center;
      animation: fade-in-up 1s ease-out;
    }

    .loading-ring {
      width: 60px;
      height: 60px;
      border: 6px solid rgba(59, 130, 246, 0.2);
      border-top: 6px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
  </style>
</head>

  <script>
    // ===============================
    // Preloader
    // ===============================
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('preloader').classList.add('hidden');

        // เล่นเพลงอัตโนมัติทันทีหลัง preloader หายไป
        setTimeout(() => {
          music.muted = false;
          music.play().catch(e => {
            console.log('ไม่สามารถเล่นเพลงอัตโนมัติได้:', e);
            // ถ้าเล่นไม่ได้ จะรอให้ผู้ใช้ interact ครั้งแรก
          });
        }, 100);

        // แสดงการ์ดโปรไฟล์หลังจาก preloader หายไป
        setTimeout(() => {
          document.querySelector('.profile-card').style.opacity = '1';
          // แสดงองค์ประกอบต่างๆ ทีละตัว
          document.querySelectorAll('.opacity-0').forEach((el, index) => {
            setTimeout(() => {
              el.style.opacity = '1';
            }, index * 200);
          });
        }, 300);
      }, 1200);
    });

    // ===============================
    // Star field effect
    // ===============================
    function createStars() {
      const starCount = window.innerWidth < 768 ? 15 : 30;
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
        star.style.animationDelay = Math.random() * 3 + 's';
        document.body.appendChild(star);
      }
    }
    createStars();

    // ===============================
    // เพลง + ควบคุมเสียง
    // ===============================
    const music = document.getElementById('bg-music');
    const muteBtn = document.getElementById('mute-btn');
    const volumeSlider = document.getElementById('volume-slider');

    // ตั้งค่าเริ่มต้น
    music.volume = 0.7;

    // สำรองกรณีเพลงไม่เล่นอัตโนมัติ (บางเบราว์เซอร์อาจบล็อก)
    const handleBackupInteraction = () => {
      if (music.paused) {
        music.muted = false;
        music.play().catch(e => console.log('ไม่สามารถเล่นเพลงได้:', e));
      }
    };

    document.addEventListener('click', handleBackupInteraction, {once: true});
    document.addEventListener('touchstart', handleBackupInteraction, {once: true});

    // Mute/Unmute
    muteBtn.addEventListener('click', () => {
      music.muted = !music.muted;
      muteBtn.innerHTML = music.muted ?
        '<i class="fas fa-volume-mute"></i>' :
        '<i class="fas fa-volume-up"></i>';

      // เอฟเฟกต์ animation
      muteBtn.style.transform = 'scale(0.8)';
      setTimeout(() => muteBtn.style.transform = 'scale(1)', 150);
    });

    // ปรับระดับเสียง
    volumeSlider.addEventListener('input', () => {
      music.volume = volumeSlider.value;
      if (music.volume === 0) {
        music.muted = true;
        muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
      } else {
        music.muted = false;
        muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
      }
    });

    // ===============================
    // Canvas หิมะตก (ปรับปรุง)
    // ===============================
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');

    const resizeCanvas = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    };
    resizeCanvas();

    const snowCount = window.innerWidth < 768 ? 40 : 80;
    const flakes = [];

    // สร้างหิมะ
    for (let i = 0; i < snowCount; i++) {
      flakes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 4 + 1,
        speed: Math.random() * 2 + 0.5,
        swing: Math.random() * 2 + 0.5,
        angle: Math.random() * Math.PI * 2,
        opacity: Math.random() * 0.8 + 0.3,
        sparkle: Math.random() > 0.7
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const f of flakes) {
        f.y += f.speed;
        f.x += Math.sin(f.angle) * f.swing;
        f.angle += 0.01;

        // Reset ตำแหน่งเมื่อหิมะตกลงล่าง
        if (f.y > canvas.height + 10) {
          f.y = -10;
          f.x = Math.random() * canvas.width;
        }

        // Reset ตำแหน่งเมื่อหิมะออกจากขอบ
        if (f.x > canvas.width + 10) f.x = -10;
        if (f.x < -10) f.x = canvas.width + 10;

        // วาดหิมะ
        ctx.globalAlpha = f.opacity;
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);

        if (f.sparkle) {
          // หิมะเป็นประกาย
          const gradient = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
          gradient.addColorStop(0, "rgba(255, 255, 255, 1)");
          gradient.addColorStop(0.5, "rgba(200, 220, 255, 0.8)");
          gradient.addColorStop(1, "rgba(100, 150, 255, 0.3)");
          ctx.fillStyle = gradient;
        } else {
          ctx.fillStyle = "white";
        }

        ctx.fill();

        // เพิ่ม glow effect
        ctx.shadowColor = "rgba(255, 255, 255, 0.5)";
        ctx.shadowBlur = f.r * 2;
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.globalAlpha = 1;
      }

      requestAnimationFrame(animate);
    }
    animate();

    // Event listeners
    window.addEventListener('resize', () => {
      setTimeout(resizeCanvas, 100);
    });

    window.addEventListener('orientationchange', () => {
      setTimeout(resizeCanvas, 200);
    });

    // ===============================
    // Enhanced social button interactions
    // ===============================
    document.querySelectorAll('.social-btn').forEach(btn => {
      btn.addEventListener('mouseenter', () => {
        btn.style.filter = 'brightness(1.1) saturate(1.2)';
      });

      btn.addEventListener('mouseleave', () => {
        btn.style.filter = 'brightness(1) saturate(1)';
      });

      btn.addEventListener('click', (e) => {
        // Ripple effect
        const rect = btn.getBoundingClientRect();
        const ripple = document.createElement('span');
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
        ripple.style.position = 'absolute';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'rgba(255, 255, 255, 0.3)';
        ripple.style.transform = 'scale(0)';
        ripple.style.animation = 'ripple 0.6s ease-out';
        ripple.style.pointerEvents = 'none';

        btn.appendChild(ripple);

        setTimeout(() => {
          ripple.remove();
        }, 600);

        const platform = e.currentTarget.textContent.trim();
        console.log(`คลิก: ${platform}`);
      });
    });

    // Add ripple animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes ripple {
        from {
          transform: scale(0);
          opacity: 1;
        }
        to {
          transform: scale(1);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);

    // ===============================
    // Error handling
    // ===============================

    // Handle music loading errors
    music.addEventListener('error', () => {
      console.log('ไม่สามารถโหลดไฟล์เพลงได้');
      document.querySelector('.volume-control').style.display = 'none';
    });

    // Handle video loading errors
    const video = document.getElementById('bg-video');
    video.addEventListener('error', () => {
      console.log('ไม่สามารถโหลดไฟล์วิดีโอได้');
      document.body.style.background = 'linear-gradient(135deg, #1e293b, #0f172a, #1e1b4b)';
    });

    // ===============================
    // Performance optimization
    // ===============================

    // Reduce animations on low-end devices
    if (navigator.hardwareConcurrency < 4) {
      document.querySelectorAll('.floating-orb').forEach(orb => {
        orb.style.display = 'none';
      });
    }

    // Pause animations when page is not visible
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        document.querySelectorAll('*').forEach(el => {
          el.style.animationPlayState = 'paused';
        });
      } else {
        document.querySelectorAll('*').forEach(el => {
          el.style.animationPlayState = 'running';
        });
      }
    });
  </script>
